# manage_custom_rules.py 配置文件
# 用法：
#   python manage_custom_rules.py run-config
#   python manage_custom_rules.py run-config manage_custom_rules.toml
#
# 执行顺序：
#   1. 先删除 rules.remove / rule_urls.remove
#   2. 再添加 rules.add / rule_urls.add
#   3. 最后按 [generate] 配置决定是否重新生成

[rules]
# 要从 custom.txt 删除的规则
remove = []

# 要追加到 custom.txt 的规则
add = [
  # "domain:example.com",
  # "full:api.example.com",
  # "regexp:^.+\\.internal\\.example\\.com$",
]

[rule_urls]
# 要从 custom_rule.txt 删除的链接
remove = []

# 要追加到 custom_rule.txt 的链接
add = [
  # "https://example.com/rules.txt",
]

[generate]
# true 时会在完成增删后调用 generate_cn_rules.py
run = false

# run=true 时是否仅使用缓存
no_download = true

# run=true 时是否优先使用备用下载链接
use_fallback = false
