name: Auto Update CN Domain Rules

on:
  schedule:
    # 每天凌晨 3 点自动运行
    - cron: '0 3 * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  generate-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Validate generator
        run: |
          python3 -m py_compile generate_cn_rules.py
          python3 -m unittest discover -s tests -v
          
      - name: Run generate script
        run: |
          python3 generate_cn_rules.py -v --log
          
      - name: Check changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_ENV
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_ENV
          fi
          git status
          
      - name: Commit and push changes
        if: env.has_changes == 'true'
        run: |
          git config --local user.email "3138947285@qq.com"
          git config --local user.name "Hi-Jiajun"
          
          git add custom_cn_mark.txt organized_cn_mark.txt generate.log 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No generated file changes to commit"
            exit 0
          fi
          
          # 获取当前日期
          DATE=$(date '+%Y-%m-%d')
          git commit -m "auto: update rules at $DATE"
          
          git push
      - name: Create tag and Release
        if: env.has_changes == 'true'
        run: |
          TAG_NAME="daily-$(date '+%Y%m%d')"
          
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists locally, skipping release creation"
            exit 0
          fi
          
          if git ls-remote --tags origin "$TAG_NAME" | grep -q "$TAG_NAME"; then
            echo "Tag $TAG_NAME already exists on origin, skipping release creation"
            exit 0
          fi
          
          git tag -a "$TAG_NAME" -m "Daily CN domain rules update"
          git push origin "$TAG_NAME"
          
          sleep 3
          
          gh release create "$TAG_NAME" \
            --title "CN Domain Rules - $TAG_NAME" \
            --notes "Auto-generated CN domain rules updated at $(date)" \
            custom_cn_mark.txt \
            organized_cn_mark.txt \
            generate_cn_rules.py \
            custom.txt \
            custom_rule.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
