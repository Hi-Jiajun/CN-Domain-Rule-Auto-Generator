name: Auto Update CN Domain Rules

on:
  schedule:
    # 每天凌晨 3 点自动运行
    - cron: '0 3 * * *'
  # 支持手动触发
  workflow_dispatch:
  # 当有代码推送时触发
  push:
    branches:
      - main

jobs:
  generate-rules:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install requests
          
      - name: Run generate script
        run: |
          python3 generate_cn_rules.py -v --log
          
      - name: Check changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add custom_cn_mark.txt organized_cn_mark.txt generate.log
          
          # 获取当前日期
          DATE=$(date '+%Y-%m-%d %H:%M:%S')
          git commit -m "auto: update rules at $DATE"
          
          git push
        continue-on-error: true
        
      - name: Upload artifact
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: generated-rules
          path: |
            custom_cn_mark.txt
            organized_cn_mark.txt
          retention-days: 7
