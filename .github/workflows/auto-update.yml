name: Auto Update CN Domain Rules

on:
  schedule:
    # 每天凌晨 3 点自动运行
    - cron: '0 3 * * *'
  # 支持手动触发
  workflow_dispatch:
  # 当有代码推送时触发
  push:
    branches:
      - main

jobs:
  generate-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install requests
          
      - name: Run generate script
        run: |
          python3 generate_cn_rules.py -v --log
          
      - name: Check changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add custom_cn_mark.txt organized_cn_mark.txt generate.log
          
          # 获取当前日期
          DATE=$(date '+%Y-%m-%d %H:%M:%S')
          git commit -m "auto: update rules at $DATE"
          
          git push
        continue-on-error: true
        
      - name: Create Release
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: latest
          release_name: Latest CN Domain Rules
          body: |
            Auto-generated CN domain rules
            Updated at: ${{ github.run_id }}
          draft: false
          prerelease: false
        continue-on-error: true
        
      - name: Upload Release Asset
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: custom_cn_mark.txt
          asset_name: custom_cn_mark.txt
          asset_content_type: text/plain
        continue-on-error: true
        
      - name: Upload Release Asset 2
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: organized_cn_mark.txt
          asset_name: organized_cn_mark.txt
          asset_content_type: text/plain
        continue-on-error: true
