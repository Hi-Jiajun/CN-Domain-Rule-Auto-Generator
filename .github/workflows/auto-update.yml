name: Auto Update CN Domain Rules

on:
  schedule:
    # 每天凌晨 3 点自动运行
    - cron: '0 3 * * *'
  # 支持手动触发
  workflow_dispatch:
  # 当有代码推送时触发
  push:
    branches:
      - main

jobs:
  generate-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install requests
          
      - name: Run generate script
        run: |
          python3 generate_cn_rules.py -v --log || true
          
      - name: Check changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_ENV
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_ENV
          fi
          git status
          
      - name: Commit and push changes
        if: env.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add custom_cn_mark.txt organized_cn_mark.txt generate.log 2>/dev/null || true
          
          # 获取当前日期
          DATE=$(date '+%Y-%m-%d')
          git commit -m "auto: update rules at $DATE" || echo "No changes to commit"
          
          git push || echo "Push failed, continuing..."
        continue-on-error: true
        
      - name: Create tag
        if: env.has_changes == 'true'
        run: |
          git tag -f daily-${{ github.run_id }} || echo "Tag creation failed"
          git push -f origin daily-${{ github.run_id }} || echo "Tag push failed"
        continue-on-error: true
        
      - name: Create Release
        if: env.has_changes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          body: |
            Auto-generated CN domain rules
            Updated at: ${{ github.run_id }}
            Build: ${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            custom_cn_mark.txt
            organized_cn_mark.txt
            generate_cn_rules.py
            custom.txt
            custom_rule.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
